build:
  maxIssues: 0

config:
  validation: true

style:
  MagicNumber:
    active: false
  ForbiddenImport:
    active: true
    imports:
      - 'org.junit.Assert'
      - 'org.junit.Assert.*'
      - 'kotlin.test.*'
      - 'com.google.common.truth.Truth'
      - 'com.google.common.truth.Truth.*'

formatting:
  active: true
  android: true
  autoCorrect: false

comments:
  UndocumentedPublicClass:
    active: true
    searchInNestedClass: false
    excludes:
      - '**/src/test/**'
      - '**/src/androidTest/**'
      - '**/src/testDebug/**'
      - '**/src/testRelease/**'
  UndocumentedPublicFunction:
    active: true
    excludes:
      - '**/src/test/**'
      - '**/src/androidTest/**'
      - '**/src/testDebug/**'
      - '**/src/testRelease/**'
  UndocumentedPublicProperty:
    active: true
    excludes:
      - '**/src/test/**'
      - '**/src/androidTest/**'
      - '**/src/testDebug/**'
      - '**/src/testRelease/**'

